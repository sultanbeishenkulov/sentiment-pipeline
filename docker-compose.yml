version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sentiment_user
      POSTGRES_PASSWORD: sentiment_pass
      POSTGRES_DB: sentiment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentiment_user -d sentiment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  producer:
    build: ./producer
    container_name: producer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: reddit-posts
      LANG_FILTER: en
      MAX_POSTS_PER_SEC: "0"
      LOG_LEVEL: INFO
    restart: on-failure

  consumer:
    build: ./consumer
    container_name: consumer
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: reddit-posts
      KAFKA_GROUP_ID: sentiment-consumer
      POSTGRES_DSN: postgresql://sentiment_user:sentiment_pass@postgres:5432/sentiment_db
      MODEL_PATH: /app/model_artifacts
      BATCH_SIZE: "32"
      BATCH_TIMEOUT_SEC: "2.0"
      LOG_LEVEL: INFO
    volumes:
      - ./model/artifacts:/app/model_artifacts:ro
    restart: on-failure

  api:
    build: ./api
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql://sentiment_user:sentiment_pass@postgres:5432/sentiment_db
      DB_POOL_MIN: "2"
      DB_POOL_MAX: "10"
      LOG_LEVEL: INFO
    restart: on-failure

  dashboard:
    build: ./dashboard
    container_name: dashboard
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      REFRESH_INTERVAL: "10"
    restart: on-failure

volumes:
  postgres_data:
